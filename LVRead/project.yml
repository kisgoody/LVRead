name: LVRead
options:
  bundleIdPrefix: com.lvread
  deploymentTarget:
    iOS: "14.0"
  xcodeVersion: "15.0"
settings:
  SWIFT_VERSION: "5.9"
targets:
  LVRead:
    type: application
    platform: iOS
    sources:
      - path: LVRead
    settings:
      base:
        INFOPLIST_FILE: LVRead/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.lvread.app
        DEVELOPMENT_TEAM: ""
        SUPPORTS_MACCATALYST: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        OTHER_LDFLAGS:
          - "-lsqlite3"
          - "-lz"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
  LVReadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LVReadTests
    dependencies:
      - target: LVRead
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lvread.app.tests
        INFOPLIST_FILE: LVReadTests/Info.plist
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LVRead.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LVRead"
        BUNDLE_LOADER: "$(TEST_HOST)"
